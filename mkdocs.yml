site_name: dapr-agents-oas-adapter
site_description: Bidirectional conversion between Open Agent Spec and Dapr Agents
site_url: https://github.com/heltondoria/dapr-agents-oas-adapter
repo_url: https://github.com/heltondoria/dapr-agents-oas-adapter
repo_name: heltondoria/dapr-agents-oas-adapter

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Loading OAS Specs: guide/loading.md
      - Exporting to OAS: guide/exporting.md
      - Caching: guide/caching.md
      - Async Support: guide/async.md
      - Validation: guide/validation.md
      - Logging: guide/logging.md
  - API Reference:
      - Overview: api/index.md
      - Loader: api/loader.md
      - Exporter: api/exporter.md
      - Types: api/types.md
      - Validation: api/validation.md
      - Caching: api/caching.md
      - Async Loader: api/async_loader.md
      - Logging: api/logging.md
      - Utilities: api/utils.md
  - Examples:
      - From OAS: examples/from-oas.md
      - To OAS: examples/to-oas.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            docstring_section_style: table
            members_order: source
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/heltondoria/dapr-agents-oas-adapter
